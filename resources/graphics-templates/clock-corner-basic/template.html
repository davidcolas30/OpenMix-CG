<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reloj de Esquina</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="canvas-root">
      <section id="clock-card" class="clock-card" aria-label="Reloj de esquina">
        <div class="clock-topline">
          <span class="clock-label" data-field="label">DIRECTO</span>
          <span class="clock-zone" data-field="zoneLabel">Madrid</span>
        </div>
        <div id="clock-time" class="clock-time">12:30:45</div>
        <div id="clock-date" class="clock-date">jueves, 14 de noviembre</div>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
