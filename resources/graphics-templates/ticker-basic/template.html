<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticker Básico</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="canvas-root">
      <section id="ticker" class="ticker" aria-label="Ticker de noticias">
        <div class="ticker-label" data-field="label">URGENTE</div>
        <div id="ticker-shell" class="ticker-shell">
          <div id="ticker-track" class="ticker-track">
            <span id="ticker-copy-a" class="ticker-copy" data-field="text">
              OpenMix-CG integra mezcla multicamara, WebRTC y grafismo HTML5 en una sola sala de realizacion.
            </span>
            <span id="ticker-copy-b" class="ticker-copy" aria-hidden="true">
              OpenMix-CG integra mezcla multicamara, WebRTC y grafismo HTML5 en una sola sala de realizacion.
            </span>
          </div>
        </div>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
